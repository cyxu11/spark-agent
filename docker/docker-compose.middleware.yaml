services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deerflow
      POSTGRES_USER: deerflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./middleware/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deerflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 单节点模式（默认）─────────────────────────────────────────────────
  # 启动: docker compose -f docker-compose.middleware.yaml up -d
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Redis 哨兵模式（HA，可选）──────────────────────────────────────────────
  # 启动: docker compose -f docker-compose.middleware.yaml --profile sentinel up -d
  # config.yaml 对应改为: stream_bridge.type: redis-sentinel
  redis-master:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_master_data:/data
    restart: unless-stopped
    profiles: [sentinel]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis-replica-1:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379 --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_replica1_data:/data
    restart: unless-stopped
    profiles: [sentinel]
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    command: redis-server --replicaof redis-master 6379 --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_replica2_data:/data
    restart: unless-stopped
    profiles: [sentinel]
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-1:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./middleware/sentinel.conf:/etc/redis/sentinel.conf:ro
    ports:
      - "26379:26379"
    restart: unless-stopped
    profiles: [sentinel]
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-2:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./middleware/sentinel.conf:/etc/redis/sentinel.conf:ro
    ports:
      - "26380:26379"
    restart: unless-stopped
    profiles: [sentinel]
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel-3:
    image: redis:7-alpine
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./middleware/sentinel.conf:/etc/redis/sentinel.conf:ro
    ports:
      - "26381:26379"
    restart: unless-stopped
    profiles: [sentinel]
    depends_on:
      redis-master:
        condition: service_healthy

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  redis_master_data:
  redis_replica1_data:
  redis_replica2_data:
  minio_data:
  skills_data:      # Skills 目录共享（集群模式）
  threads_data:     # 线程工作区共享 workspace + outputs + uploads（集群模式）

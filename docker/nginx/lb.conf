upstream deerflow_nodes {
    least_conn;
    server node-a:2026;
    server node-b:2026;
    keepalive 32;
}

server {
    listen 80;

    location / {
        proxy_pass http://deerflow_nodes;
        proxy_http_version 1.1;
        proxy_buffering off;      # SSE 必须关闭，否则事件流会被缓冲
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

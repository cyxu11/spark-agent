# @doc R2.13-Team4-Refactor (2026-04-29) | 单 Agent 重构后的工具白名单
# - mcp_price_converter: 计算性问题(JKM 换算/斜率定价)主用
# - mcp_iflytek_cbm: 概念性问题(什么是热值/单位定义)联网查询
# R2.13-Team4-Patch3 (2026-04-29): 恢复联网搜索 — 用户希望换算分析师能回答"什么是热值计算"等概念问题
tools:
- name: mcp_price_converter
  description: |
    【LNG 价格换算工具 — 客户《JKM 转换测算表-20260415.xlsx》全公式集】
    输入品类(JKM/TTF/HH/Brent/WTI/LNG现货-东北亚/LNG现货-欧洲)自动查询最新基准价 + 9 大换算参数(汇率/吨→MMBtu/吨→GJ/吨→m³/VAT/接收站费/退税基数/退税比例);也可输入 custom_price + custom_unit 自定义换算。
    返回字段:品类 / 数据日期 / 汇率 / 接收站费用 / 价格($/MMBtu) / **成本不含税(元/吨+元/m³)** / **出站价含税(元/吨+元/m³)** / **退税额(元/吨)** / **出站价退税后(元/吨+元/m³)** / 等价油价($/bbl) / 价格(元/GJ) + 多斜率定价表(11.5%~14.5% × 5 档油价)。
    📐 核心公式(已在工具内部计算好):
      ① 成本不含税 = JKM × 52.08 × 汇率
      ② 出站价含税 = 成本不含税 × (1 + 9%) + 311.3
      ③ 退税额 = max(0, (成本不含税 - 1539.4) × 9% × 80%)
      ④ 出站价退税后 = 出站价含税 - 退税额
    ✅ 适用问题类型:计算性(JKM=15 对应国内价 / Brent 80 美元等价 LNG / 12.5% 斜率定价)
    ❌ 不适用问题:概念性(什么是热值 / MMBtu 是什么 / 退税政策原理) — 改用 mcp_iflytek_cbm 联网查询
  service_id: -301
  call_mode: serial
- name: mcp_iflytek_cbm
  description: |
    讯飞联网搜索 — 用于回答 LNG 价格换算相关的**概念性 / 政策性 / 行业知识**问题。
    ✅ 适用问题类型:
      - 概念定义("什么是热值计算/MMBtu/JKM/JCC 长协")
      - 政策解读("十五五新政策对 LNG 退税的影响" / "中国 LNG 进口增值税政策")
      - 行业知识("LNG 单位换算的国际惯例" / "JKM 与 TTF 的关系")
      - 实时资讯("当前 LNG 现货行情趋势")
    ❌ 不适用问题:具体数值换算(改用 mcp_price_converter)
  service_id: -221
  call_mode: serial
